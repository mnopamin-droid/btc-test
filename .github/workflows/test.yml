name: تست ربات بیت‌کوین (MACD)

on:
  workflow_dispatch:

env:
  # این خط اخطار Node.js را غیرفعال می‌کند تا فقط خروجی ربات را ببینید
  ACTIONS_ALLOW_USE_UNSECURE_NODE_VERSION: true

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: نصب کتابخانه‌ها
        run: |
          pip install --upgrade pip
          pip install -r requirements.txt
      - name: اجرای ربات
        run: python btc_macd_bot.py
